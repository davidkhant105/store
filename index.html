<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Blue Convenience Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Tesseract.js - Latest Version -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        .sky-gradient { background: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 162, 255, 0.1), 0 8px 10px -6px rgba(0, 162, 255, 0.1); }
        .modal-overlay { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
    </style>
</head>
<body class="sky-gradient min-h-screen text-slate-800 font-sans">

    <div class="max-w-md mx-auto p-4 pb-24">
        <!-- Header -->
        <header class="text-center py-8">
            <div class="bg-blue-500 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-store text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-blue-600">Sky Mart</h1>
            <p class="text-blue-400">Convenience at your doorstep</p>
        </header>

        <!-- Product List -->
        <section class="bg-white rounded-3xl p-6 card-shadow mb-6">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2 flex items-center">
                <i class="fas fa-shopping-basket mr-2 text-blue-500"></i> Select Items
            </h2>
            <div id="product-list" class="space-y-4"></div>
        </section>

        <!-- Customer Details -->
        <section class="bg-white rounded-3xl p-6 card-shadow mb-6">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2 flex items-center">
                <i class="fas fa-user-edit mr-2 text-blue-500"></i> Delivery Info
            </h2>
            <div class="space-y-4">
                <input type="text" id="cust-name" class="w-full px-4 py-2 rounded-xl border border-blue-100 focus:ring-2 focus:ring-blue-400 focus:outline-none bg-blue-50/30" placeholder="Name">
                <input type="tel" id="cust-phone" class="w-full px-4 py-2 rounded-xl border border-blue-100 focus:ring-2 focus:ring-blue-400 focus:outline-none bg-blue-50/30" placeholder="Phone">
                <textarea id="cust-address" rows="2" class="w-full px-4 py-2 rounded-xl border border-blue-100 focus:ring-2 focus:ring-blue-400 focus:outline-none bg-blue-50/30" placeholder="Address"></textarea>
            </div>
        </section>

        <button onclick="calculateTotal()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all transform active:scale-95 mb-6">
            CHECK TOTAL
        </button>

        <!-- Payment Section -->
        <div id="payment-section" class="hidden">
            <section class="bg-white rounded-3xl p-6 card-shadow border-2 border-blue-200 mb-6">
                <div class="text-center p-4 bg-blue-600 rounded-2xl text-white mb-6">
                    <p class="text-sm opacity-80">Total to Pay</p>
                    <p class="text-3xl font-black" id="final-amount-display">0 MMK</p>
                </div>

                <!-- Hidden canvas for image processing -->
                <canvas id="proc-canvas" class="hidden"></canvas>

                <div class="mt-4">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Upload or Paste Slip</label>
                    <div id="drop-zone" class="relative border-2 border-dashed border-blue-200 rounded-2xl p-6 text-center hover:bg-blue-50 transition-colors" tabindex="0">
                        <input type="file" id="slip-upload" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="handleFileSelect(this)">
                        <div id="slip-preview-container">
                            <i class="fas fa-camera text-3xl text-blue-300 mb-2"></i>
                            <p class="text-sm text-slate-500">Tap to Upload / Paste Screenshot</p>
                        </div>
                    </div>
                </div>

                <!-- Scanning Loader -->
                <div id="scan-loading" class="hidden text-center py-4 bg-blue-50 rounded-xl mt-4">
                    <div class="loader mr-2"></div>
                    <span id="scan-status" class="text-sm text-blue-600 font-medium">Initializing scanner...</span>
                </div>

                <!-- Scanned Details -->
                <div id="slip-data" class="hidden space-y-2 mt-4 bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <div class="flex justify-between text-sm"><span>Trans ID:</span> <span id="slip-trans-id" class="font-medium">-</span></div>
                    <div class="flex justify-between text-sm pt-2 border-t mt-2">
                        <span class="font-bold">Detected Amount:</span> 
                        <span id="slip-amount-val" class="font-bold text-blue-600">0 MMK</span>
                    </div>
                </div>

                <button id="submit-btn" onclick="submitOrder()" disabled class="w-full mt-6 bg-slate-300 text-white font-bold py-4 rounded-2xl transition-all">
                    CONFIRM ORDER
                </button>
            </section>
        </div>
    </div>

    <!-- Alert Modal -->
    <div id="alert-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 modal-overlay">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div id="alert-icon" class="text-5xl mb-4"></div>
            <h3 id="alert-title" class="text-xl font-bold mb-2"></h3>
            <p id="alert-msg" class="text-slate-500 mb-6"></p>
            <button id="modal-ok-btn" onclick="closeModal()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl">OK</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxyvJJvXDRpxwm5yDqV2_aZSe9n29JyQni5vz6nEP0PAliUfP1RBrpUSr0zUw4h2_H0/exec"; 
        const products = [
            { id: 1, name: "Premium Arabica Coffee", price: 4500 },
            { id: 2, name: "Organic Whole Milk (1L)", price: 3200 },
            { id: 3, name: "Potato Chips - Spicy", price: 1500 },
            { id: 4, name: "Mineral Water (500ml)", price: 500 }
        ];

        let cart = {}, currentTotal = 0, scannedSlipData = null;

        function initProducts() {
            const container = document.getElementById('product-list');
            container.innerHTML = products.map(p => `
                <div class="flex items-center justify-between p-3 border border-blue-50 rounded-2xl">
                    <div>
                        <p class="font-semibold text-slate-700">${p.name}</p>
                        <p class="text-xs text-blue-500 font-medium">${p.price.toLocaleString()} MMK</p>
                    </div>
                    <div class="flex items-center space-x-3">
                        <button onclick="updateQty(${p.id}, -1)" class="w-8 h-8 rounded-full border border-blue-200 text-blue-500 flex items-center justify-center">-</button>
                        <span id="qty-${p.id}" class="w-4 text-center font-bold">0</span>
                        <button onclick="updateQty(${p.id}, 1)" class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">+</button>
                    </div>
                </div>
            `).join('');
        }

        function updateQty(id, delta) {
            cart[id] = Math.max(0, (cart[id] || 0) + delta);
            document.getElementById(`qty-${id}`).innerText = cart[id];
        }

        function calculateTotal() {
            currentTotal = products.reduce((acc, p) => acc + (p.price * (cart[p.id] || 0)), 0);
            if (currentTotal === 0) return showAlert("Empty", "Please select at least one item", "🛒", "text-blue-500");
            document.getElementById('final-amount-display').innerText = currentTotal.toLocaleString() + " MMK";
            document.getElementById('payment-section').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // Paste support
        window.addEventListener('paste', e => {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) processFile(items[i].getAsFile());
            }
        });

        function handleFileSelect(input) { if (input.files && input.files[0]) processFile(input.files[0]); }

        async function processFile(file) {
            const status = document.getElementById('scan-status');
            const loading = document.getElementById('scan-loading');
            loading.classList.remove('hidden');
            status.innerText = "Enhancing image quality...";

            const reader = new FileReader();
            reader.onload = async (e) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.getElementById('proc-canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        const avg = (data[i] + data[i+1] + data[i+2]) / 3;
                        const val = avg > 128 ? 255 : 0; 
                        data[i] = data[i+1] = data[i+2] = val;
                    }
                    ctx.putImageData(imageData, 0, 0);

                    status.innerText = "Extracting text...";
                    try {
                        const worker = await Tesseract.createWorker('eng');
                        const { data: { text } } = await worker.recognize(canvas.toDataURL());
                        await worker.terminate();
                        performOCRAnalysis(text);
                    } catch (err) {
                        showAlert("Error", "OCR Engine failed. Try again.", "❌", "text-red-500");
                    } finally {
                        loading.classList.add('hidden');
                    }
                };
                img.src = e.target.result;
                document.getElementById('slip-preview-container').innerHTML = `<img src="${e.target.result}" class="max-h-32 mx-auto rounded-lg shadow-md">`;
            };
            reader.readAsDataURL(file);
        }

        function performOCRAnalysis(rawText) {
            const cleanedText = rawText.replace(/[\s,]/g, '');
            const amountMatches = rawText.match(/\b\d{1,3}(,\d{3})*(\.\d+)?\b/g) || [];
            const numbers = amountMatches.map(n => parseInt(n.replace(/,/g, '')));
            
            const detectedAmount = numbers.find(n => n === currentTotal) || Math.max(...numbers, 0);
            const transIdMatch = rawText.match(/[A-Z0-9]{10,25}/i);

            scannedSlipData = {
                id: transIdMatch ? transIdMatch[0] : "TRANS-" + Date.now(),
                amount: detectedAmount
            };

            document.getElementById('slip-data').classList.remove('hidden');
            document.getElementById('slip-trans-id').innerText = scannedSlipData.id;
            document.getElementById('slip-amount-val').innerText = scannedSlipData.amount.toLocaleString() + " MMK";

            const btn = document.getElementById('submit-btn');
            if (scannedSlipData.amount === currentTotal) {
                btn.disabled = false;
                btn.className = "w-full mt-6 bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all";
            } else {
                showAlert("Mismatch", "Amount on slip doesn't match total.", "💰", "text-red-500");
            }
        }

        async function submitOrder() {
            const btn = document.getElementById('submit-btn');
            btn.innerText = "SENDING...";
            btn.disabled = true;

            const payload = {
                customer: document.getElementById('cust-name').value,
                phone: document.getElementById('cust-phone').value,
                total: currentTotal,
                transId: scannedSlipData.id,
                items: "Order Confirmed"
            };

            try {
                // Post to Google Sheets
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                
                // Show Success Pop-up
                showAlert("Order Success", "Your order has been placed successfully!", "✅", "text-green-500");
                
                // Setup reload on OK click
                document.getElementById('modal-ok-btn').onclick = () => location.reload();
            } catch (e) {
                showAlert("Error", "Submission failed. Please check connection.", "❌", "text-red-500");
                btn.disabled = false;
                btn.innerText = "CONFIRM ORDER";
            }
        }

        function showAlert(t, m, i, c) {
            document.getElementById('alert-title').innerText = t;
            document.getElementById('alert-msg').innerText = m;
            document.getElementById('alert-icon').innerText = i;
            document.getElementById('alert-title').className = `text-xl font-bold mb-2 ${c}`;
            document.getElementById('alert-modal').classList.remove('hidden');
        }

        function closeModal() { 
            document.getElementById('alert-modal').classList.add('hidden'); 
        }
        
        window.onload = initProducts;
    </script>
</body>
</html>
